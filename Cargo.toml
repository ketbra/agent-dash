[workspace]
members = [
    "crates/agent-dash-core",
    "crates/agent-dashd",
    "crates/agent-dash-hook",
    "crates/agentctl",
]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
tokio = { version = "1", features = ["full"] }
interprocess = { version = "2", features = ["tokio"] }
sysinfo = "0.34"
