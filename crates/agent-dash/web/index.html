<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-dash</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Sessions</h2>
        <div style="display:flex;gap:4px;">
          <button id="collapse-btn" type="button" title="Collapse sidebar">&#9664;</button>
          <button id="view-toggle-btn" type="button" title="Toggle terminal view">&#9638;</button>
          <button id="new-session-btn" type="button" title="Create new session">+</button>
        </div>
      </div>
      <ul id="session-list"></ul>
    </aside>
    <main id="main">
      <button id="mobile-menu-btn" type="button" title="Open sessions">&#9776;</button>
      <div id="permission-banner" class="hidden"></div>
      <div id="messages"></div>
      <div id="terminal-view" class="hidden">
        <div id="mobile-keys" class="hidden">
          <button type="button" data-key="up" title="Up">&#9650;</button>
          <button type="button" data-key="down" title="Down">&#9660;</button>
          <button type="button" data-key="enter" title="Enter">&#9166;</button>
        </div>
      </div>
      <div id="thinking-indicator" class="hidden"></div>
      <form id="prompt-form" class="hidden">
        <div id="image-previews" class="hidden"></div>
        <div id="prompt-row">
          <input type="text" id="prompt-input" placeholder="Send a prompt... (paste images with Ctrl+V)" autocomplete="off">
          <button type="submit">Send</button>
        </div>
        <div id="suggestion" class="hidden"></div>
      </form>
    </main>
    <div id="backdrop"></div>
  </div>
  <div id="new-session-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>New Session</h3>
      <label for="modal-agent">Agent</label>
      <select id="modal-agent">
        <option value="claude" selected>Claude Code</option>
        <option value="codex">Codex CLI</option>
        <option value="copilot">GitHub Copilot</option>
      </select>
      <label for="modal-cwd">Working Directory</label>
      <div class="autocomplete-wrap">
        <input type="text" id="modal-cwd" placeholder="~/projects/my-app" autocomplete="off">
        <ul id="modal-cwd-suggestions" class="hidden"></ul>
      </div>
      <div class="modal-buttons">
        <button type="button" id="modal-cancel">Cancel</button>
        <button type="button" id="modal-create">Create</button>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
