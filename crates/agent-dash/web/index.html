<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-dash</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Sessions</h2>
        <button id="new-session-btn" type="button" title="Create new session">+</button>
      </div>
      <ul id="session-list"></ul>
    </aside>
    <main id="main">
      <div id="permission-banner" class="hidden"></div>
      <div id="messages"></div>
      <div id="terminal-container" class="hidden">
        <div id="terminal-header">
          <span>Terminal Output</span>
          <button id="terminal-close" type="button">&times;</button>
        </div>
        <div id="terminal-view"></div>
      </div>
      <div id="thinking-indicator" class="hidden"></div>
      <form id="prompt-form" class="hidden">
        <div id="image-previews" class="hidden"></div>
        <div id="prompt-row">
          <input type="text" id="prompt-input" placeholder="Send a prompt... (paste images with Ctrl+V)" autocomplete="off">
          <button type="button" id="terminal-toggle" title="Toggle terminal output">&#9638;</button>
          <button type="submit">Send</button>
        </div>
        <div id="suggestion" class="hidden"></div>
      </form>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
